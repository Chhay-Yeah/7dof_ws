arm:
  # Default: KDL ships with MoveIt — works but is non-deterministic on redundant arms.
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05    # bumped from 0.005 — gives KDL more time on hard poses

  # Recommended for 7-DOF: TRAC-IK is far more reliable on redundant chains.
  # To enable:
  #   sudo apt install ros-humble-trac-ik-kinematics-plugin
  # then comment out the three lines above and uncomment these:
  # kinematics_solver: trac_ik_kinematics_plugin/TRAC_IKKinematicsPlugin
  # kinematics_solver_search_resolution: 0.005
  # kinematics_solver_timeout: 0.05
  # solve_type: Distance
